<!DOCTYPE html>
<html>
<head>
<title>MapReduce Word Count</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="glass-container">

<h1>MapReduce Word Count Demo</h1>

<p class="quote">
Turning raw text into meaningful insights using MapReduce
</p>

<textarea id="inputText" placeholder="Enter text here..."></textarea>

<input type="file" id="fileInput" accept=".txt" onchange="showFileName()">

<p id="fileName"></p>

<br>

<button onclick="runMapReduce()">Run MapReduce</button>
<button onclick="clearText()">Clear</button>

<h2>Output</h2>

<div class="output-box">
<pre id="output"></pre>
</div>

<h2>Word Frequency Chart</h2>

<canvas id="chart" height="150"></canvas>

</div>

<script src="script.js"></script>

</body>
</html>
